<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>The Markets &middot; Lesson 2</title>
<style>
  :root{--void:#0C0A12;--deep:#110E19;--surface:#1A1625;--card:#1F1B2D;--lav:#B8A9D4;--lavL:#D4C9EA;--lavM:#8B7DAF;--gold:#D4B896;--cream:#EDE8E0;--creamS:#D5CFC5;--sage:#7DAF8B;--wRed:#D48B8B;--muted:#6B6380;--brd:#2A2540}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{overflow-x:hidden;background:var(--void);color:var(--creamS);font-family:Georgia,'Times New Roman',serif;font-size:16px;line-height:1.9}
  body{min-height:100vh;min-height:100dvh;background:radial-gradient(ellipse at 50% 0%,var(--surface) 0%,var(--void) 70%)}
  button{touch-action:manipulation;-webkit-user-select:none;user-select:none;font-family:Georgia,serif}
  .glow{position:fixed;top:-150px;left:50%;transform:translateX(-50%);width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(184,169,212,.024) 0%,transparent 70%);pointer-events:none;z-index:0}
  .header{position:sticky;top:0;z-index:10;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd);background:rgba(17,14,25,.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
  .header-left{display:flex;align-items:center;gap:8px}
  .header-icon{font-size:16px;color:var(--lavM)}
  .header-label{font-size:11px;color:var(--lavM);letter-spacing:2px;text-transform:uppercase}
  .dots{display:flex;gap:4px;flex-wrap:wrap;max-width:180px;justify-content:center}
  .dot{height:6px;border-radius:3px;transition:all .4s ease}
  .dot.past{width:6px;background:var(--sage)}.dot.current{width:16px;background:var(--lav)}.dot.future{width:6px;background:var(--brd)}
  .content{padding:30px 22px 160px;max-width:460px;margin:0 auto;position:relative;z-index:1}
  .title-meta{font-size:10px;color:var(--lavM);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
  .title-main{font-size:26px;color:var(--cream);font-weight:500;line-height:1.3;margin-bottom:6px}
  .title-sub{font-size:13px;color:var(--muted)}.title-line{width:32px;height:1px;margin-top:16px;background:linear-gradient(90deg,var(--lav),transparent)}
  .block{margin-bottom:22px;opacity:0;transform:translateY(14px)}.block.visible{animation:fadeSlide .6s ease forwards}.block.shown{opacity:1;transform:translateY(0)}
  .block-text{font-size:16px;line-height:1.9;color:var(--creamS)}
  .block-emphasis{font-size:17px;line-height:1.9;color:var(--cream);font-weight:500}
  .block-quiet{font-size:15px;line-height:1.9;color:var(--lavM);font-style:italic}
  .block-insight{background:linear-gradient(135deg,var(--card),var(--surface));border-radius:16px;padding:22px 20px;border-left:3px solid var(--lavM)}
  .block-insight p{font-size:16px;line-height:1.9;color:var(--cream)}
  .block-hook{background:rgba(184,169,212,.03);border-radius:16px;padding:22px 20px;border-left:3px solid rgba(184,169,212,.2)}
  .block-hook p{font-size:15px;line-height:1.9;color:var(--lavL);font-style:italic}
  .block-breath{height:1px;width:24px;margin:28px 0;background:linear-gradient(90deg,var(--lavM),transparent);opacity:.4}
  .quiz-box{border-radius:18px;padding:22px 18px;margin:18px 0;border:1px solid var(--brd);background:var(--card);transition:all .4s}
  .quiz-box.correct{background:rgba(125,175,139,.06);border-color:rgba(125,175,139,.27)}.quiz-box.wrong{background:rgba(212,184,150,.06);border-color:rgba(212,184,150,.27)}
  .quiz-question{font-size:15px;color:var(--lavL);font-weight:600;margin-bottom:16px}
  .quiz-option{display:block;width:100%;padding:16px 18px;border-radius:14px;text-align:left;font-family:Georgia,serif;font-size:15px;cursor:pointer;transition:all .3s;border:1px solid var(--brd);background:var(--surface);color:var(--creamS);margin-bottom:10px}
  .quiz-option:last-child{margin-bottom:0}
  .quiz-option.correct-answer{border-color:rgba(125,175,139,.53);background:rgba(125,175,139,.09);color:var(--sage)}
  .quiz-option.wrong-answer{border-color:rgba(212,184,150,.4);background:rgba(212,184,150,.07);color:var(--gold)}
  .quiz-option.dimmed{opacity:.35}.quiz-option.locked{cursor:default}
  .quiz-feedback{font-size:13px;margin-top:14px;line-height:1.7;display:none}
  .quiz-feedback.show{display:block}.quiz-feedback.correct{color:var(--sage)}.quiz-feedback.wrong{color:var(--gold)}
  .complete-screen{text-align:center;padding:40px 20px;animation:fadeSlide .8s ease}
  .complete-circle{width:60px;height:60px;border-radius:50%;margin:0 auto 20px;background:linear-gradient(135deg,rgba(125,175,139,.27),rgba(125,175,139,.13));border:1px solid rgba(125,175,139,.27);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--sage)}
  .complete-title{font-size:18px;color:var(--cream);font-weight:500;margin-bottom:8px}
  .complete-text{font-size:14px;color:var(--muted);line-height:1.6;max-width:320px;margin:0 auto}
  .complete-line{width:40px;height:1px;margin:28px auto;background:linear-gradient(90deg,transparent,rgba(139,125,175,.27),transparent)}
  .complete-next{font-size:12px;color:var(--muted)}
  .btn-container{position:fixed;bottom:0;left:0;right:0;z-index:20;padding:14px 22px 44px;background:linear-gradient(transparent,var(--void) 40%)}
  .btn-continue{display:block;width:100%;max-width:460px;margin:0 auto;padding:16px;border-radius:16px;border:none;font-size:15px;font-weight:700;font-family:Georgia,serif;letter-spacing:.5px;transition:all .35s}
  .btn-continue.active{background:linear-gradient(135deg,var(--lavM),var(--lav));color:var(--void);cursor:pointer}
  .btn-continue.disabled{background:var(--card);color:var(--muted);cursor:default}
  .hidden{display:none}
  @keyframes fadeSlide{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="glow"></div>
<div class="header"><div class="header-left"><span class="header-icon">&#9826;</span><span class="header-label">Lesson 2</span></div><div class="dots" id="dots"></div><div style="width:50px"></div></div>
<div class="content"><div style="margin-bottom:32px"><p class="title-meta">Private Lessons by Arnaud</p><h1 class="title-main">The Words</h1><p class="title-sub">Speaking the language of traders</p><div class="title-line"></div></div><div id="blocks"></div><div id="complete-area" class="hidden"></div></div>
<div class="btn-container" id="btn-container"><button class="btn-continue active" id="btn-continue" onclick="handleContinue()">Continue</button></div>
<script>
var blocks=[
{t:"p",v:"There\u2019s something that happens when you learn the name of a thing."},
{t:"e",v:"It stops being strange. It stops being scary. The moment you can call it what it is \u2014 it belongs to you. You own it now. That\u2019s what language does. It turns the unknown into something you can hold in your hands."},
{t:"p",v:"That\u2019s what this lesson is, Mom. I\u2019m going to hand you five words. And once you have them, no conversation about trading will ever sound like it wasn\u2019t meant for you."},
{t:"q2",v:"Because it was always meant for you. You just needed someone to open the door."},
{t:"b",v:""},
{t:"i",v:"A pip is the smallest move a currency pair can make. It\u2019s the fourth decimal place \u2014 0.0001. If EUR/USD moves from 1.0800 to 1.0801, that\u2019s one pip. One step. Tiny. Almost invisible."},
{t:"p",v:"But a hundred of them on a standard lot is $1,000. A thousand of them is $10,000. That\u2019s how everything real is built. Not all at once. One step at a time. So small you barely notice until you look back and realize how far you\u2019ve come."},
{t:"e",v:"Small things, repeated with patience, become powerful things. That\u2019s true in markets. That\u2019s true in life. That\u2019s true in everything worth doing."},
{t:"b",v:""},
{t:"p",v:"A lot is how you measure the size of a trade. A standard lot is 100,000 units. That sounds like a lot. But you don\u2019t need that much \u2014 brokers lend you the difference through something called leverage. A mini lot is 10,000. A micro lot is 1,000."},
{t:"q2",v:"You always start small. You learn the rhythm first. You listen. You watch. And when you\u2019re ready \u2014 not when someone tells you, but when you feel it in your bones \u2014 you grow."},
{t:"p",v:"The spread is the small gap between the price you can buy at and the price you can sell at. Every broker takes a tiny cut. Think of it as the cost of being in the room. It\u2019s honest. It\u2019s predictable. And the tighter the spread, the closer you are to the action."},
{t:"b",v:""},
{t:"i",v:"Bid and ask. Two words that always come as a pair. The bid is what someone will pay you right now. The ask is what you\u2019d pay to buy right now. The ask is always a little higher than the bid. That gap between them \u2014 that\u2019s the spread."},
{t:"e",v:"Two sides of every exchange. One offering. One receiving. That\u2019s how every market has worked for centuries. If you think about it \u2014 that\u2019s how every meaningful connection works too. Someone reaching out. Someone reaching back. Always a pair. Always finding each other."},
{t:"b",v:""},
{t:"q",q:"EUR/USD moves from 1.0850 to 1.0900. How many pips did it move?",o:["5 pips","50 pips"],c:1,e:"50 pips. From 0850 to 0900 \u2014 fifty steps. On a standard lot, that\u2019s $500. You counted that without even hesitating. The language is already becoming yours."},
{t:"p",v:"Five words. Pip. Lot. Spread. Bid. Ask. That\u2019s the whole vocabulary."},
{t:"e",v:"And now you speak a language that\u2019s been spoken for centuries. That was spoken before electricity. Before phones. Before any of us were here. And it\u2019ll still be spoken long after. You just joined something that doesn\u2019t end."},
{t:"q2",v:"Your son handed you a door. You walked through it. That\u2019s who you\u2019ve always been. Open. Ready. Even when you didn\u2019t know what was on the other side."},
{t:"h",v:"Next \u2014 I\u2019m going to teach you to read a chart. Not like a textbook. Like a story someone left for you to find. The way some people look at the sky and see shapes that have always been there, you\u2019re going to look at a chart and see what happened, what\u2019s happening, and what\u2019s coming. That kind of sight never leaves you once you have it. It becomes part of you. It goes wherever you go. Lesson 3 coming soon."}
];
var currentBlock=0,quizAnswered=false;
function countVisible(upTo){var c=0;for(var i=0;i<upTo;i++)if(blocks[i].t!=='b')c++;return c;}
function renderDots(){var d=document.getElementById('dots');d.innerHTML='';var total=blocks.filter(function(b){return b.t!=='b'}).length;var cur=countVisible(currentBlock);for(var i=0;i<total;i++){var dot=document.createElement('div');dot.className='dot '+(i<cur?'past':i===cur?'current':'future');d.appendChild(dot);}}
function renderBlock(index,animate){
  var b=blocks[index],container=document.getElementById('blocks'),el=document.createElement('div');
  el.className='block'+(animate?' visible':' shown');
  if(b.t==='p')el.innerHTML='<p class="block-text">'+b.v+'</p>';
  else if(b.t==='e')el.innerHTML='<p class="block-emphasis">'+b.v+'</p>';
  else if(b.t==='q2')el.innerHTML='<p class="block-quiet">'+b.v+'</p>';
  else if(b.t==='i')el.innerHTML='<div class="block-insight"><p>'+b.v+'</p></div>';
  else if(b.t==='h')el.innerHTML='<div class="block-hook"><p>'+b.v+'</p></div>';
  else if(b.t==='b'){el.innerHTML='<div class="block-breath"></div>';el.style.marginBottom='8px';}
  else if(b.t==='q'){
    var html='<div class="quiz-box" id="quiz-box"><p class="quiz-question">'+b.q+'</p>';
    b.o.forEach(function(opt,oi){html+='<button class="quiz-option" id="qopt-'+oi+'" onclick="handleQuizAnswer('+oi+')">'+opt+'</button>';});
    html+='<p class="quiz-feedback" id="quiz-feedback"></p></div>';el.innerHTML=html;
  }
  container.appendChild(el);
  setTimeout(function(){el.scrollIntoView({behavior:'smooth',block:'center'});},120);
}
function handleQuizAnswer(selected){
  if(quizAnswered)return;quizAnswered=true;var b=blocks[currentBlock],correct=selected===b.c;
  b.o.forEach(function(_,i){var opt=document.getElementById('qopt-'+i);opt.classList.add('locked');if(i===b.c)opt.classList.add('correct-answer');else if(i===selected)opt.classList.add('wrong-answer');if(i!==b.c&&i!==selected)opt.classList.add('dimmed');});
  document.getElementById('quiz-box').classList.add(correct?'correct':'wrong');
  var fb=document.getElementById('quiz-feedback');fb.classList.add('show',correct?'correct':'wrong');
  fb.textContent=correct?'\u2726 '+b.e:'Smart instinct \u2014 here\u2019s the subtle difference: '+b.e;
  updateButton();
}
function updateButton(){
  var btn=document.getElementById('btn-continue'),b=blocks[currentBlock],isQuiz=b&&b.t==='q',atEnd=currentBlock>=blocks.length-1;
  if(isQuiz&&!quizAnswered){btn.className='btn-continue disabled';btn.textContent='Answer to continue';}
  else if(atEnd){btn.className='btn-continue active';btn.textContent='Complete Lesson \u2726';}
  else{btn.className='btn-continue active';btn.textContent='Continue';}
}
function handleContinue(){
  var b=blocks[currentBlock];if(b&&b.t==='q'&&!quizAnswered)return;
  if(currentBlock>=blocks.length-1){
    document.getElementById('btn-container').classList.add('hidden');
    var area=document.getElementById('complete-area');area.classList.remove('hidden');
    area.innerHTML='<div class="complete-screen"><div class="complete-circle">\u2713</div><p class="complete-title">Lesson 2 Complete</p><p class="complete-text">Pip. Lot. Spread. Bid. Ask. Five words that have been used for centuries by people all over the world. And now they\u2019re yours. They go with you wherever you go. They always will.</p><div class="complete-line"></div><p class="complete-next">Lesson 3 is on its way.</p></div>';
    setTimeout(function(){area.scrollIntoView({behavior:'smooth',block:'center'});},200);return;
  }
  currentBlock++;quizAnswered=false;renderBlock(currentBlock,true);renderDots();updateButton();
}
renderDots();renderBlock(0,true);updateButton();
</script>
</body>
</html>
