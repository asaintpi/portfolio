<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>The Markets - Lesson 1</title>
<style>
  :root {
    --void: #0C0A12; --deep: #110E19; --surface: #1A1625; --card: #1F1B2D;
    --lav: #B8A9D4; --lavL: #D4C9EA; --lavM: #8B7DAF; --lavG: #C4B5E2;
    --gold: #D4B896; --cream: #EDE8E0; --creamS: #D5CFC5;
    --sage: #7DAF8B; --wRed: #D48B8B;
    --muted: #6B6380; --brd: #2A2540; --brdL: #352F4A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    overflow-x: hidden; background: var(--void); color: var(--creamS);
    font-family: Georgia, 'Times New Roman', serif; font-size: 16px; line-height: 1.9;
  }
  body {
    min-height: 100vh; min-height: 100dvh;
    background: radial-gradient(ellipse at 50% 0%, var(--surface) 0%, var(--void) 70%);
  }
  button { touch-action: manipulation; -webkit-user-select: none; user-select: none; font-family: Georgia, serif; }

/* Ambient glow */
.glow {
position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
width: 500px; height: 500px; border-radius: 50%;
background: radial-gradient(circle, rgba(184,169,212,0.024) 0%, transparent 70%);
pointer-events: none; z-index: 0;
}

/* Header */
.header {
position: sticky; top: 0; z-index: 10;
padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
border-bottom: 1px solid var(--brd); background: rgba(17,14,25,0.94);
backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.header-left { display: flex; align-items: center; gap: 8px; }
.header-icon { font-size: 16px; color: var(--lavM); }
.header-label { font-size: 11px; color: var(--lavM); letter-spacing: 2px; text-transform: uppercase; }
.dots { display: flex; gap: 5px; }
.dot { height: 6px; border-radius: 3px; transition: all 0.4s ease; }
.dot.past { width: 6px; background: var(--sage); }
.dot.current { width: 18px; background: var(--lav); }
.dot.future { width: 6px; background: var(--brd); }

/* Content area */
.content {
padding: 30px 22px 160px; max-width: 460px; margin: 0 auto;
position: relative; z-index: 1;
}

/* Title block */
.title-meta { font-size: 10px; color: var(--lavM); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
.title-main { font-size: 26px; color: var(--cream); font-weight: 500; line-height: 1.3; margin-bottom: 6px; }
.title-sub { font-size: 13px; color: var(--muted); }
.title-line { width: 32px; height: 1px; margin-top: 16px; background: linear-gradient(90deg, var(--lav), transparent); }

/* Blocks */
.block { margin-bottom: 22px; opacity: 0; transform: translateY(14px); }
.block.visible { animation: fadeSlide 0.6s ease forwards; }
.block.shown { opacity: 1; transform: translateY(0); }

.block-text { font-size: 16px; line-height: 1.9; color: var(--creamS); }

.block-insight {
background: linear-gradient(135deg, var(--card), var(--surface));
border-radius: 16px; padding: 22px 20px; border-left: 3px solid var(--lavM);
}
.block-insight p { font-size: 16px; line-height: 1.9; color: var(--cream); }

.block-hook {
background: rgba(184,169,212,0.03); border-radius: 16px;
padding: 22px 20px; border-left: 3px solid rgba(184,169,212,0.2);
}
.block-hook p { font-size: 15px; line-height: 1.9; color: var(--lavL); font-style: italic; }

/* Quiz */
.quiz-box { border-radius: 18px; padding: 22px 18px; margin: 18px 0; border: 1px solid var(--brd); background: var(--card); transition: all 0.4s; }
.quiz-box.correct { background: rgba(125,175,139,0.06); border-color: rgba(125,175,139,0.27); }
.quiz-box.wrong { background: rgba(212,184,150,0.06); border-color: rgba(212,184,150,0.27); }
.quiz-question { font-size: 15px; color: var(--lavL); font-weight: 600; margin-bottom: 16px; }
.quiz-option {
display: block; width: 100%; padding: 16px 18px; border-radius: 14px; text-align: left;
font-family: Georgia, serif; font-size: 15px; cursor: pointer; transition: all 0.3s;
border: 1px solid var(--brd); background: var(--surface); color: var(--creamS);
margin-bottom: 10px;
}
.quiz-option:last-child { margin-bottom: 0; }
.quiz-option.correct-answer { border-color: rgba(125,175,139,0.53); background: rgba(125,175,139,0.09); color: var(--sage); }
.quiz-option.wrong-answer { border-color: rgba(212,139,139,0.4); background: rgba(212,139,139,0.07); color: var(--wRed); }
.quiz-option.dimmed { opacity: 0.35; }
.quiz-option.locked { cursor: default; }
.quiz-feedback { font-size: 13px; margin-top: 14px; line-height: 1.7; }
.quiz-feedback.correct { color: var(--sage); }
.quiz-feedback.wrong { color: var(--gold); }

/* Complete screen */
.complete-screen { text-align: center; padding: 40px 20px; }
.complete-circle {
width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 20px;
background: linear-gradient(135deg, rgba(125,175,139,0.27), rgba(125,175,139,0.13));
border: 1px solid rgba(125,175,139,0.27);
display: flex; align-items: center; justify-content: center;
font-size: 24px; color: var(--sage);
}
.complete-title { font-size: 18px; color: var(--cream); font-weight: 500; margin-bottom: 8px; }
.complete-text { font-size: 14px; color: var(--muted); line-height: 1.6; }
.complete-line { width: 40px; height: 1px; margin: 24px auto; background: linear-gradient(90deg, transparent, rgba(139,125,175,0.27), transparent); }
.complete-next { font-size: 12px; color: var(--muted); }

/* Continue button */
.btn-container {
position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
padding: 14px 22px 44px;
background: linear-gradient(transparent, var(--void) 40%);
}
.btn-continue {
display: block; width: 100%; max-width: 460px; margin: 0 auto;
padding: 16px; border-radius: 16px; border: none;
font-size: 15px; font-weight: 700; font-family: Georgia, serif;
letter-spacing: 0.5px; transition: all 0.35s;
}
.btn-continue.active {
background: linear-gradient(135deg, var(--lavM), var(--lav));
color: var(--void); cursor: pointer;
}
.btn-continue.disabled {
background: var(--card); color: var(--muted); cursor: default;
}

.hidden { display: none; }

@keyframes fadeSlide {
from { opacity: 0; transform: translateY(14px); }
to { opacity: 1; transform: translateY(0); }
}
</style>

</head>
<body>

<div class="glow"></div>

<div class="header">
  <div class="header-left">
    <span class="header-icon">✦</span>
    <span class="header-label">Lesson 1</span>
  </div>
  <div class="dots" id="dots"></div>
  <div style="width:50px"></div>
</div>

<div class="content" id="content">
  <div style="margin-bottom:32px">
    <p class="title-meta">Private Lessons by Arnaud</p>
    <h1 class="title-main">The Secret Language of Money</h1>
    <p class="title-sub">What forex actually is</p>
    <div class="title-line"></div>
  </div>
  <div id="blocks"></div>
  <div id="complete-area" class="hidden"></div>
</div>

<div class="btn-container" id="btn-container">
  <button class="btn-continue active" id="btn-continue" onclick="handleContinue()">Continue</button>
</div>

<script>
const blocks = [
  { t:"p", v:"Mom. I\u2019m going to teach you something that most people will never understand. Not because it\u2019s too hard \u2014 because nobody ever sat them down and explained it the right way." },
  { t:"p", v:"I\u2019m going to explain it the right way." },
  { t:"p", v:"You\u2019ve been around forex your whole life without knowing it. Every time the news talks about the dollar being strong or weak, every time prices shift because of something happening overseas \u2014 that\u2019s forex moving underneath everything. It touches every economy, every country, every person. You just didn\u2019t know it had a name." },
  { t:"i", v:"The forex market moves $7.5 trillion every single day. More than the stock market, the bond market, and every cryptocurrency combined. It never sleeps \u2014 when New York closes, Tokyo opens. When Tokyo closes, London opens. It just moves around the world, endlessly. Like the sun. It never stops. It just changes where it shines." },
  { t:"p", v:"When you see \u201CEUR/USD = 1.08\u201D \u2014 that means one euro costs $1.08. If that number goes up tomorrow, the euro got stronger. If it drops, the dollar got stronger." },
  { t:"p", v:"Traders make money by reading the signs that tell them which direction that number is going to move \u2014 and positioning themselves on the right side before it happens. That\u2019s the whole game. Direction. Timing. Discipline." },
  { t:"p", v:"And I\u2019m going to teach you all three." },
  { t:"q", q:"If EUR/USD goes from 1.08 to 1.10 \u2014 which currency got stronger?", o:["The Dollar","The Euro"], c:1, e:"The euro. It now costs MORE dollars to buy one. You already understand the most fundamental concept in forex. Most people take a week to get here. You got it in five minutes." },
  { t:"h", v:"Next, I\u2019m going to teach you the language. Every world has its own vocabulary. Once you speak it, you belong in the room. Lesson 2 coming soon." }
];

let currentBlock = 0;
let quizAnswered = false;
let quizSelection = -1;
let isComplete = false;

function renderDots() {
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  blocks.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot ' + (i < currentBlock ? 'past' : i === currentBlock ? 'current' : 'future');
    dotsEl.appendChild(dot);
  });
}

function renderBlock(index, animate) {
  const b = blocks[index];
  const container = document.getElementById('blocks');
  let el;

  if (b.t === 'p') {
    el = document.createElement('div');
    el.className = 'block' + (animate ? ' visible' : ' shown');
    el.innerHTML = '<p class="block-text">' + b.v + '</p>';
  }
  else if (b.t === 'i') {
    el = document.createElement('div');
    el.className = 'block' + (animate ? ' visible' : ' shown');
    el.innerHTML = '<div class="block-insight"><p>' + b.v + '</p></div>';
  }
  else if (b.t === 'h') {
    el = document.createElement('div');
    el.className = 'block' + (animate ? ' visible' : ' shown');
    el.innerHTML = '<div class="block-hook"><p>' + b.v + '</p></div>';
  }
  else if (b.t === 'q') {
    el = document.createElement('div');
    el.className = 'block' + (animate ? ' visible' : ' shown');
    el.id = 'quiz-block';

    let html = '<div class="quiz-box" id="quiz-box">';
    html += '<p class="quiz-question">' + b.q + '</p>';
    b.o.forEach((opt, oi) => {
      html += '<button class="quiz-option" id="qopt-' + oi + '" onclick="handleQuizAnswer(' + oi + ')">' + opt + '</button>';
    });
    html += '<p class="quiz-feedback hidden" id="quiz-feedback"></p>';
    html += '</div>';
    el.innerHTML = html;
  }

  container.appendChild(el);

  // Scroll to new block
  setTimeout(() => {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function handleQuizAnswer(selected) {
  if (quizAnswered) return;
  quizAnswered = true;
  quizSelection = selected;
  const b = blocks[currentBlock];
  const correct = selected === b.c;

  // Style options
  b.o.forEach((_, i) => {
    const opt = document.getElementById('qopt-' + i);
    opt.classList.add('locked');
    if (i === b.c) opt.classList.add('correct-answer');
    else if (i === selected) opt.classList.add('wrong-answer');
    if (i !== b.c && i !== selected) opt.classList.add('dimmed');
  });

  // Style quiz box
  const box = document.getElementById('quiz-box');
  box.classList.add(correct ? 'correct' : 'wrong');

  // Show feedback
  const fb = document.getElementById('quiz-feedback');
  fb.classList.remove('hidden');
  fb.classList.add(correct ? 'correct' : 'wrong');
  fb.textContent = (correct ? '\u2726 ' : '') + b.e;

  // Enable continue
  updateButton();
}

function updateButton() {
  const btn = document.getElementById('btn-continue');
  const b = blocks[currentBlock];
  const isQuiz = b && b.t === 'q';
  const atEnd = currentBlock >= blocks.length - 1;

  if (isComplete) {
    document.getElementById('btn-container').classList.add('hidden');
    return;
  }

  if (isQuiz && !quizAnswered) {
    btn.className = 'btn-continue disabled';
    btn.textContent = 'Answer to continue';
  } else if (atEnd) {
    btn.className = 'btn-continue active';
    btn.textContent = 'Complete Lesson \u2726';
  } else {
    btn.className = 'btn-continue active';
    btn.textContent = 'Continue';
  }
}

function showComplete() {
  isComplete = true;
  document.getElementById('btn-container').classList.add('hidden');
  const area = document.getElementById('complete-area');
  area.classList.remove('hidden');
  area.innerHTML = '<div class="complete-screen" style="animation: fadeSlide 0.8s ease">' +
    '<div class="complete-circle">\u2713</div>' +
    '<p class="complete-title">Lesson 1 Complete</p>' +
    '<p class="complete-text">You understood the most fundamental concept in the largest financial market on Earth. In five minutes.</p>' +
    '<div class="complete-line"></div>' +
    '<p class="complete-next">Lesson 2 is on its way.</p>' +
    '</div>';
  setTimeout(() => {
    area.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 200);
}

function handleContinue() {
  const b = blocks[currentBlock];
  if (b && b.t === 'q' && !quizAnswered) return;

  if (currentBlock >= blocks.length - 1) {
    showComplete();
    return;
  }

  currentBlock++;
  quizAnswered = false;
  quizSelection = -1;
  renderBlock(currentBlock, true);
  renderDots();
  updateButton();
}

// Initialize
renderDots();
renderBlock(0, true);
updateButton();
</script>

</body>
</html>
