<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Arnaud Saint-Pierre</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Serif+JP:wght@200;300;400;500&family=Zen+Antique+Soft&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #000;
overflow: hidden;
width: 100vw;
height: 100vh;
-webkit-tap-highlight-color: transparent;
}

canvas#shader {
position: fixed;
top: 0; left: 0;
width: 100vw; height: 100vh;
z-index: 0;
opacity: 0;
transition: opacity 1.8s cubic-bezier(0.16, 1, 0.3, 1);
}

canvas#shader.visible {
opacity: 1;
}

/* ── Layers ── */
.vignette {
position: fixed; inset: 0;
background: radial-gradient(ellipse at 50% 85%, transparent 20%, rgba(0,0,0,0.5) 70%, rgba(0,0,0,0.85) 100%);
z-index: 5; pointer-events: none;
}

.grain {
position: fixed;
top: -50%; left: -50%;
width: 200%; height: 200%;
z-index: 6; pointer-events: none;
opacity: 0.03;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 512 512’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.85’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’/%3E%3C/svg%3E”);
animation: grainShift 0.4s steps(1) infinite;
}

@keyframes grainShift {
0%   { transform: translate(0, 0); }
25%  { transform: translate(-1.5%, -0.5%); }
50%  { transform: translate(0.5%, 1.5%); }
75%  { transform: translate(-0.5%, -1%); }
100% { transform: translate(1%, 0.5%); }
}

/* ── Name System ── */
.name-stage {
position: fixed; inset: 0;
z-index: 20;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
pointer-events: none;
}

/* The card container — holds both faces */
.card-container {
perspective: 1200px;
width: auto;
height: auto;
opacity: 0;
}

.card-container.visible {
opacity: 1;
transition: opacity 0.6s ease;
}

.card {
position: relative;
transform-style: preserve-3d;
transition: transform 0.55s cubic-bezier(0.77, 0, 0.175, 1);
}

.card.flipped {
transform: rotateY(180deg);
}

.card-face {
backface-visibility: hidden;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
}

.card-back {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
transform: rotateY(180deg);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
}

/* ── Japanese Face ── */
.jp-name {
font-family: ‘Noto Serif JP’, serif;
font-weight: 300;
font-size: clamp(26px, 5vw, 64px);
color: rgba(255, 255, 255, 0.0);
letter-spacing: 0.2em;
white-space: nowrap;
user-select: none;
direction: rtl;
unicode-bidi: bidi-override;
}

.jp-char {
display: inline-block;
opacity: 0;
transform: translateX(20px);
filter: blur(4px);
}

.jp-char.revealed {
opacity: 1;
transform: translateX(0);
filter: blur(0);
color: rgba(255, 255, 255, 0.88);
transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s ease, color 0.5s ease;
}

/* ── English Face ── */
.en-name {
font-family: ‘Cormorant Garamond’, serif;
font-weight: 300;
font-size: clamp(24px, 5vw, 66px);
color: rgba(255, 255, 255, 0.92);
letter-spacing: 0.32em;
text-transform: uppercase;
white-space: nowrap;
user-select: none;
}

/* ── Lines ── */
.line {
width: 0;
height: 1px;
background: rgba(255, 255, 255, 0.18);
transition: width 1.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.line.expanded {
width: min(380px, 65vw);
}

.line-top { margin-bottom: 20px; }
.line-bottom { margin-top: 20px; }

/* ── Subtitle ── */
.subtitle {
font-family: ‘Cormorant Garamond’, serif;
font-weight: 400;
font-size: clamp(9px, 1.2vw, 13px);
color: rgba(255, 255, 255, 0.0);
letter-spacing: 0.55em;
text-transform: uppercase;
margin-top: 28px;
user-select: none;
transition: color 2s ease;
}

.subtitle.visible {
color: rgba(255, 255, 255, 0.32);
}

/* ── Coordinates ── */
.coords {
position: fixed;
top: 24px; left: 28px;
font-family: ‘Cormorant Garamond’, serif;
font-weight: 400;
font-size: 10px;
color: rgba(255, 255, 255, 0.0);
letter-spacing: 0.3em;
z-index: 30;
pointer-events: none;
transition: color 2.5s ease;
user-select: none;
}

.coords.visible {
color: rgba(255, 255, 255, 0.15);
}

/* ── Classification stamp ── */
.classification {
position: fixed;
top: 24px; right: 28px;
font-family: ‘Cormorant Garamond’, serif;
font-weight: 400;
font-size: 10px;
color: rgba(255, 255, 255, 0.0);
letter-spacing: 0.3em;
text-transform: uppercase;
z-index: 30;
pointer-events: none;
transition: color 2.5s ease;
user-select: none;
}

.classification.visible {
color: rgba(255, 255, 255, 0.15);
}

/* ── Enter prompt ── */
.enter-cta {
position: fixed;
bottom: 36px;
left: 50%;
transform: translateX(-50%);
font-family: ‘Cormorant Garamond’, serif;
font-weight: 400;
font-size: 10px;
color: rgba(255, 255, 255, 0.0);
letter-spacing: 0.6em;
text-transform: uppercase;
z-index: 30;
pointer-events: auto;
cursor: pointer;
user-select: none;
transition: color 1.5s ease;
padding: 12px 24px;
}

.enter-cta.visible {
color: rgba(255, 255, 255, 0.18);
}

.enter-cta:hover {
color: rgba(255, 255, 255, 0.45);
}

/* ── Scanline (ultra subtle) ── */
.scanlines {
position: fixed; inset: 0;
background: repeating-linear-gradient(
0deg,
transparent, transparent 2px,
rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 3px
);
z-index: 7;
pointer-events: none;
}
</style>

</head>
<body>

<canvas id="shader"></canvas>

<div class="vignette"></div>
<div class="grain"></div>
<div class="scanlines"></div>

<div class="coords" id="coords">37.3382°N · 121.8863°W</div>
<div class="classification" id="classification">Section 00</div>

<div class="name-stage">
  <div class="line line-top" id="lineTop"></div>

  <div class="card-container" id="cardContainer">
    <div class="card" id="card">
      <!-- Front: Japanese -->
      <div class="card-face">
        <div class="jp-name" id="jpName"></div>
      </div>
      <!-- Back: English -->
      <div class="card-back">
        <div class="en-name">Arnaud Saint-Pierre</div>
      </div>
    </div>
  </div>

  <div class="line line-bottom" id="lineBottom"></div>
  <div class="subtitle" id="subtitle">Software Engineer · Writer · Architect</div>
</div>

<div class="enter-cta" id="enterCta">Enter</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  WebGL AURORA SHADER
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('shader');
const gl = canvas.getContext('webgl', {
  antialias: false, alpha: false,
  preserveDrawingBuffer: false,
  powerPreference: 'high-performance'
});

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  canvas.width  = window.innerWidth  * dpr;
  canvas.height = window.innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

const vsSource = `
  attribute vec2 a_position;
  void main() { gl_Position = vec4(a_position, 0.0, 1.0); }
`;

const fsSource = `
precision highp float;

uniform float u_time;
uniform vec2  u_resolution;
uniform vec2  u_mouse;
uniform float u_birth;  // 0→1 aurora emergence

vec3 mod289(vec3 x){ return x - floor(x*(1.0/289.0))*289.0; }
vec2 mod289(vec2 x){ return x - floor(x*(1.0/289.0))*289.0; }
vec3 permute(vec3 x){ return mod289(((x*34.0)+1.0)*x); }

float snoise(vec2 v){
  const vec4 C = vec4(0.211324865405187,0.366025403784439,
                      -0.577350269189626,0.024390243902439);
  vec2 i = floor(v + dot(v, C.yy));
  vec2 x0 = v - i + dot(i, C.xx);
  vec2 i1 = (x0.x > x0.y) ? vec2(1.0,0.0) : vec2(0.0,1.0);
  vec4 x12 = x0.xyxy + C.xxzz;
  x12.xy -= i1;
  i = mod289(i);
  vec3 p = permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));
  vec3 m = max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);
  m=m*m; m=m*m;
  vec3 x = 2.0*fract(p*C.www)-1.0;
  vec3 h = abs(x)-0.5;
  vec3 ox = floor(x+0.5);
  vec3 a0 = x-ox;
  m *= 1.79284291400159-0.85373472095314*(a0*a0+h*h);
  vec3 g;
  g.x = a0.x*x0.x + h.x*x0.y;
  g.yz = a0.yz*x12.xz + h.yz*x12.yw;
  return 130.0*dot(m, g);
}

float fbm(vec2 p){
  float f=0.0, w=0.5;
  for(int i=0;i<7;i++){
    f += w*snoise(p);
    p *= 2.13;
    w *= 0.47;
  }
  return f;
}

float warpedFbm(vec2 p, float t){
  vec2 q = vec2(
    fbm(p + vec2(0.0,0.0) + t*0.11),
    fbm(p + vec2(5.2,1.3) + t*0.08)
  );
  vec2 r = vec2(
    fbm(p + 3.8*q + vec2(1.7,9.2) + t*0.065),
    fbm(p + 3.8*q + vec2(8.3,2.8) + t*0.055)
  );
  return fbm(p + 3.4*r);
}

void main(){
  vec2 uv = gl_FragCoord.xy / u_resolution.xy;
  float aspect = u_resolution.x / u_resolution.y;
  vec2 p = uv;
  p.x *= aspect;

  float t = u_time;
  float birth = u_birth;

  // Mouse warp
  vec2 mouse = u_mouse;
  mouse.x *= aspect;
  float md = length(p - mouse);
  p += (p - mouse) * 0.025 / (md + 0.6);

  // Flame UV — rises
  vec2 fuv = p * 1.1;
  fuv.y -= t * 0.065;

  // Noise fields
  float w1 = warpedFbm(fuv * 0.7, t * 0.6);
  float w2 = warpedFbm(fuv * 1.0 + 3.0, t * 0.45);

  // Flame shape — rises from bottom
  float flame = 1.0 - uv.y;
  flame = pow(flame, 1.3 + 0.3 * (1.0 - birth));

  // Birth: aurora starts as a sliver at the very bottom, grows up
  float birthMask = smoothstep(1.0 - birth * 1.1, 1.0 - birth * 0.3, uv.y);
  birthMask = 1.0 - birthMask;
  // When birth=0, only very bottom glows. When birth=1, full flame.
  float finalBirth = mix(0.0, 1.0, birth);

  // Tendrils
  float tend = snoise(vec2(p.x*3.5, p.y*1.8 - t*0.13))*0.5+0.5;
  tend *= snoise(vec2(p.x*6.0+10.0, p.y*2.2 - t*0.18))*0.5+0.5;
  float tendrilReach = smoothstep(0.35,0.0, uv.y - 0.4*birth) * tend * 0.35;

  float intensity = (flame * 0.75 + tendrilReach) * birthMask;
  intensity *= smoothstep(-0.35, 0.55, w1);
  intensity *= finalBirth;

  // ── COLOR PALETTE ──
  // The billion-dollar stove: petrol void → deep teal → aurora cyan → 
  // seafoam peaks → violet edges → white-hot coronas

  vec3 voidColor   = vec3(0.008, 0.01, 0.025);
  vec3 deepPetrol  = vec3(0.0, 0.04, 0.09);

  float hShift = sin(t*0.13)*0.5+0.5;
  vec3 auroraTeal = mix(
    vec3(0.0, 0.22, 0.32),
    vec3(0.02, 0.18, 0.40),
    hShift
  );

  vec3 auroraCyan = mix(
    vec3(0.04, 0.48, 0.58),
    vec3(0.08, 0.52, 0.44),
    sin(t*0.17 + w2*2.0)*0.5+0.5
  );

  vec3 hotPeak = vec3(0.55, 0.82, 0.88);
  vec3 violetEdge = vec3(0.14, 0.06, 0.22);
  vec3 whiteCorona = vec3(0.85, 0.92, 0.97);

  // Compose
  float i1 = intensity;
  float i2 = smoothstep(0.0, 0.55, w1 * intensity);
  float i3 = smoothstep(0.12, 0.75, w1 * intensity * 1.2);
  float i4 = smoothstep(0.35, 0.9, w1 * intensity * 1.5);
  float i5 = smoothstep(0.65, 1.0, w1 * intensity * 2.2);

  // Violet at the boundary between flame and void
  float vZone = smoothstep(0.04, 0.18, i1) * smoothstep(0.45, 0.12, i1);
  vZone += smoothstep(0.35, 0.55, uv.y) * i1 * 0.25;

  vec3 col = voidColor;
  col = mix(col, deepPetrol, smoothstep(0.0, 0.12, i1));
  col = mix(col, violetEdge, vZone * 0.5);
  col = mix(col, auroraTeal, i2 * 0.85);
  col = mix(col, auroraCyan, i3 * 0.75);
  col = mix(col, hotPeak, i4 * 0.45);
  col = mix(col, whiteCorona, i5 * 0.3);

  // Heat shimmer
  float shimmer = snoise(vec2(p.x*14.0, p.y*9.0-t*0.45)) * 0.018;
  col += shimmer * i2;

  // Center glow at base
  float cg = exp(-pow((uv.x-0.5)*2.8,2.0)) * exp(-pow((uv.y-0.95)*5.0,2.0));
  col += vec3(0.02, 0.09, 0.14) * cg * (0.8+0.2*sin(t*0.28)) * birth;

  // Breathing
  col *= 0.96 + 0.04*sin(t*0.22 + uv.y*1.8);

  // Gamma
  col = pow(col, vec3(0.91));
  col = clamp(col, 0.0, 1.0);

  gl_FragColor = vec4(col, 1.0);
}
`;

function compileShader(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
    console.error(gl.getShaderInfoLog(s)); gl.deleteShader(s); return null;
  }
  return s;
}

const vs = compileShader(gl.VERTEX_SHADER, vsSource);
const fs = compileShader(gl.FRAGMENT_SHADER, fsSource);
const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
gl.useProgram(prog);

const verts = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_position');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime  = gl.getUniformLocation(prog, 'u_time');
const uRes   = gl.getUniformLocation(prog, 'u_resolution');
const uMouse = gl.getUniformLocation(prog, 'u_mouse');
const uBirth = gl.getUniformLocation(prog, 'u_birth');

let mx=0.5, my=0.5, tmx=0.5, tmy=0.5;
document.addEventListener('mousemove', e=>{
  tmx = e.clientX/window.innerWidth;
  tmy = 1.0 - e.clientY/window.innerHeight;
});
document.addEventListener('touchmove', e=>{
  tmx = e.touches[0].clientX/window.innerWidth;
  tmy = 1.0 - e.touches[0].clientY/window.innerHeight;
}, {passive:true});

const T0 = Date.now();

function render(){
  const t = (Date.now()-T0)/1000.0;
  mx += (tmx-mx)*0.025;
  my += (tmy-my)*0.025;

  // Birth curve: 0 for first 0.8s, then eases to 1 over ~2.5s
  const birthT = Math.max(0, (t - 0.8) / 2.5);
  const birth = Math.min(1, birthT * birthT * (3 - 2*birthT)); // smoothstep

  gl.uniform1f(uTime, t);
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform2f(uMouse, mx, my);
  gl.uniform1f(uBirth, birth);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}

render();

// ═══════════════════════════════════════════════════════════════
//  CHOREOGRAPHY — the neurological sequence
// ═══════════════════════════════════════════════════════════════

// Japanese transliteration of "Arnaud Saint-Pierre"
// アルノー・サンピエール (Arunō · Sanpiēru)
const jpChars = 'ア ル ノ ー ・ サ ン ピ エ ー ル'.split(' ');

const shaderCanvas    = document.getElementById('shader');
const jpNameEl        = document.getElementById('jpName');
const cardContainer   = document.getElementById('cardContainer');
const card            = document.getElementById('card');
const lineTop         = document.getElementById('lineTop');
const lineBottom      = document.getElementById('lineBottom');
const subtitle        = document.getElementById('subtitle');
const coords          = document.getElementById('coords');
const classification  = document.getElementById('classification');
const enterCta        = document.getElementById('enterCta');

// Build JP characters as spans
jpChars.forEach((ch, i) => {
  const span = document.createElement('span');
  span.className = 'jp-char';
  span.textContent = ch;
  span.style.transitionDelay = `${i * 80}ms`;
  jpNameEl.appendChild(span);
});

// ── SEQUENCE ──

// 0.0s: Pure void (body is already black)

// 0.8s: Aurora begins emerging (handled by shader birth uniform)
setTimeout(() => {
  shaderCanvas.classList.add('visible');
}, 200);

// 1.8s: Lines begin expanding
setTimeout(() => {
  lineTop.classList.add('expanded');
  lineBottom.classList.add('expanded');
}, 1800);

// 2.2s: Card container appears, JP chars start revealing right-to-left
setTimeout(() => {
  cardContainer.classList.add('visible');
  const chars = jpNameEl.querySelectorAll('.jp-char');
  // Reveal from RIGHT to LEFT (last char first)
  const reversed = Array.from(chars).reverse();
  reversed.forEach((ch, i) => {
    setTimeout(() => {
      ch.classList.add('revealed');
    }, i * 90);
  });
}, 2200);

// 4.2s: Card snap-flips to English name
setTimeout(() => {
  card.classList.add('flipped');
}, 4200);

// 4.8s: Coordinates and classification fade in
setTimeout(() => {
  coords.classList.add('visible');
  classification.classList.add('visible');
}, 4800);

// 5.2s: Subtitle appears
setTimeout(() => {
  subtitle.classList.add('visible');
}, 5200);

// 6.0s: Enter CTA
setTimeout(() => {
  enterCta.classList.add('visible');
}, 6000);

</script>

</body>
</html>
